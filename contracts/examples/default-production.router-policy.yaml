# Default production router policy -- v3 baseline (3-tier)
#
# This is the as-shipped policy implied by v3-FINAL-SYNTHESIS.md (council D4
# 4/4). Three production tiers with empirical anchoring:
#
#   premium      model-high-capability 4.7  + canonical primer  canonical 87 ~$3      Delta 0
#   default      model-balanced 4.6 + canonical primer canonical 85 ~$0.58   Delta -1
#   narrow_scope narrow-scope model 4.5 + canonical primer  canonical 73 ~$0.21   Delta +10
#
# narrow_scope is gated behind external_review_required: true with sample
# rate 1.0 -- the +10 self-canonical Delta means the cell cannot grade its
# own work.
#
# All cost numbers below are illustrative; the operator finalises them per
# vendor invoice. They are marked `# placeholder` where revision is expected.

$schema: https://engineering-doctrine/contracts/router-policy.v1.schema.json
policy_version: 1.0.0
schema_version: 1.0.0
description: >-
  v3 production default. 3-tier policy: premium (model-high-capability, security/supervisor/
  doctrine-promotion), default (model-balanced, greenfield/refactor/audit/build),
  narrow_scope (narrow-scope model, scaffolded_typed_authority with mandatory external
  review). FALSIFIED claim_audit at default tier escalates once into premium;
  narrow-scope model is refused outright for greenfield_backbone and for build-class cells
  without a primer.

tiers:
  premium:
    model: claude-model-high-capability-4-7
    model_family: model_high_capability
    primer: anti-confab-200tok@1.0.0
    primer_sha256: c138dd966c82f7bd792684ab3fef0f50d75aa9342468db8b5d265f24f3fb35a8
    verifier_pack: evidence-pack-mcp-verifier-pack@1.0.0
    cell_classes:
      - security_critical
      - supervisor_change
      - doctrine_promotion
    max_cost_usd_per_cell: 10.00   # placeholder -- operator to finalize
    external_review_required: false
    description: >-
      model-high-capability 4.7 + canonical primer. Canonical 87, Delta self-canonical 0.
      Reserved for security-critical, supervisor, and doctrine-promotion
      classes where cost-of-wrong-answer dominates cost-of-tier.

  default:
    model: claude-model-balanced-4-6
    model_family: model_balanced
    primer: anti-confab-200tok@1.0.0
    primer_sha256: c138dd966c82f7bd792684ab3fef0f50d75aa9342468db8b5d265f24f3fb35a8
    verifier_pack: evidence-pack-mcp-verifier-pack@1.0.0
    cell_classes:
      - greenfield_backbone
      - refactor_class
      - audit_class
      - build_class
      - artifact_production
      - research_class
    max_cost_usd_per_cell: 2.00    # placeholder -- operator to finalize
    external_review_required: false
    description: >-
      model-balanced 4.6 + canonical primer. Canonical 85 at ~$0.58/cell. Beats
      native-model-high-capability by 7 points at 20% of cost; sits within 2 points of
      model-high-capability-primed at ~19% of its cost. The production backbone.

  narrow_scope:
    model: claude-narrow-scope model-4-5-20251001
    model_family: model_narrow
    primer: anti-confab-200tok@1.0.0
    primer_sha256: c138dd966c82f7bd792684ab3fef0f50d75aa9342468db8b5d265f24f3fb35a8
    verifier_pack: evidence-pack-mcp-verifier-pack@1.0.0
    cell_classes:
      - scaffolded_typed_authority
    max_cost_usd_per_cell: 0.50    # placeholder -- operator to finalize
    external_review_required: true
    external_review_sample_rate: 1.0
    description: >-
      narrow-scope model 4.5 + canonical primer. Canonical 73 at ~$0.21/cell, but Delta
      self-canonical +10 (cell over-claims by 10 points). Permitted only on
      scaffolded_typed_authority cells where a higher tier has produced the
      wire format / tests; every run sampled at 100% for non-self scoring.

escalation_rules:
  - rule_id: claim-audit-falsified-escalate
    when:
      claim_audit_verdict: FALSIFIED
      attempts_so_far: 1
    action:
      escalate_to_tier: premium
      add_primer: anti-confab-200tok@1.0.0
      max_cost_usd: 5.00      # placeholder -- operator to finalize
    evidence_ref: evidence-workbook/18-cross-product-test/v3/results/plan-b-v2-claim-audit-against-stage2/composite.md
    description: >-
      On the first FALSIFIED verdict after one retry at the default tier,
      escalate to premium with the same primer. model-high-capability + primer hit canonical
      87 -- the highest observed cell -- and absorbs the budget the failed
      retry already spent at model-balanced tier.

  - rule_id: security-critical-premium-only
    when:
      cell_class:
        - security_critical
        - supervisor_change
        - doctrine_promotion
    action:
      require_tier: premium
    evidence_ref: evidence-workbook/18-cross-product-test/v2/results/test-1-backbone/canonical-scoring-model-high-capability.md
    description: >-
      Three cell classes never run below premium tier on any attempt:
      security_critical (anything touching authority axes), supervisor_change
      (changing the host-policy-layer/execution-sandbox/secret-broker gate), doctrine_promotion (moving
      candidate doctrine to canonical). Cost-of-wrong-answer dominates.

refusal_rules:
  - rule_id: narrow-scope model-no-artifact-production-without-primer
    when:
      model_family: model_narrow
      cell_class: artifact_production
      primer: null
    action:
      refuse_routing: true
      reason: >-
        Empirical: tools-narrow-scope model+SKILLS canonical 31 (v2 Stage 2 smoking gun).
        narrow-scope model self-scored 96/100 while the binary's collect subcommand was
        a silent stub. With no primer attached the cell has zero
        anti-confabulation discipline; refuse outright.
    evidence_ref: evidence-workbook/18-cross-product-test/v2/results/test-1-backbone/canonical-scoring.md

  - rule_id: narrow-scope model-no-greenfield
    when:
      model_family: model_narrow
      cell_class: greenfield_backbone
    action:
      refuse_routing: true
      reason: >-
        narrow-scope model-PRIMED canonical 73 < model-balanced 85; Delta self-canonical +10 means
        the cell cannot detect over-claims on greenfield work. greenfield_
        backbone is the load-bearing class where the v2 canonical-31 cell
        produced the silent stub. Refused on model_narrow in all profiles.
    evidence_ref: evidence-workbook/18-cross-product-test/v2/results/test-1-backbone/canonical-scoring-narrow-scope model-primed.md

  - rule_id: narrow-scope model-narrow-scope-requires-external-review
    when:
      cell_class: scaffolded_typed_authority
      model_family: model_narrow
    action:
      require_external_review: true
      reason: >-
        Delta +10 self-canonical on narrow-scope model-PRIMED narrow-scope tier. Production
        use requires external (non-self) scoring on sampled runs (rate 1.0 at
        v1; operator may lower once an independently-measured rate is on the
        record).
    evidence_ref: evidence-workbook/18-cross-product-test/v2/results/test-1-backbone/canonical-scoring-narrow-scope model-primed.md

  - rule_id: interpreter-wrapper-block
    when:
      command_matches: "^(bash|sh|zsh|powershell|pwsh|cmd)\\s+-c"
    action:
      refuse_routing: true
      reason: >-
        CC-2 FALSIFIED at corpus scale (host-policy-layer benchmark interpreter-wrapper
        class 20%); defense-in-depth at router layer even though host-policy-layer CC-2
        fix landed. Refuses every <shell> -c invocation structurally.
    evidence_ref: evidence-workbook/18-cross-product-test/v2/results/per-tool-failure-mode-tests-results/composite.md

  - rule_id: primer-required-on-build-class
    when:
      cell_class:
        - build_class
        - artifact_production
        - refactor_class
      primer: null
    action:
      refuse_routing: true
      reason: >-
        Build-class cells must run with the canonical primer for
        measurement-grade honesty. v2 evidence: tools-model-balanced (no primer)
        canonical 78 self-Delta -11; same cell with primer is canonical 85
        self-Delta -1. The +12 to +14 honesty swing is load-bearing.
    evidence_ref: evidence-workbook/18-cross-product-test/v2/results/test-1-backbone/canonical-scoring.md

cost_ceilings:
  per_cell:
    premium_max_usd: 10.00     # placeholder -- operator to finalize
    default_max_usd: 2.00      # placeholder -- operator to finalize
    narrow_scope_max_usd: 0.50 # placeholder -- operator to finalize
  per_session:
    operator_warning_at_usd: 20.00   # placeholder -- operator to finalize
    operator_kill_at_usd: 100.00     # placeholder -- operator to finalize

audit:
  jsonl_path: audit/router.jsonl
  content_addressable: true
