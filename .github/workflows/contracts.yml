name: contracts

# Runs the v1 contract validation harness on every push and PR so the
# "Used by CI" claim in scripts/validate-contracts-v1.py is actually true.
# The harness validates the JSON Schemas, the in-memory canonical examples,
# the on-disk YAML router policies, and a battery of negative/consistency
# cases (including tier-reachability and the interpreter-wrapper-block
# heuristic regex behaviour).

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  validate-contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify primer content-pin (self-proving, stdlib-only, no deps)
        # Recompute sha256 over the in-repo anti-confabulation priming block and
        # assert it equals the hard-coded PRIMER_SHA256 (and every on-disk copy
        # + the validator constant). Runs before dependency install so a content
        # drift fails fast and cheaply.
        run: python scripts/validate-content-integrity.py
      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt
      - name: Validate contracts
        run: python scripts/validate-contracts-v1.py
